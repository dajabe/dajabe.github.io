<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dajabe's Home - Contact</title>
  <link href="css/main.css" rel="stylesheet" type="text/css">
</head>
<body>
  <header>
    <h1 id="page-title"><a href="index.html">Dajabe's Home</a></h1>
    <nav role="navigation">
      <div id="menu-bar">
        <div class="menu-item"><a href="index.html">Hello!</a></div>
        <div class="menu-item"><a href="blog/index.html">Blogs</a></div>
        <div class="menu-item"><a href="contact.html">Contact</a></div>
      </div>
    </nav> 
  </header>
  <div id="content">
    <h1>Get in touch!</h1> 
    <form class="contact-form">
      <div class="name">
        <label for="name">Name</label>
        <input type="text" id="first-name" name="first-name">
      </div>
      <div class="email">
        <label for="email-address">Email</label>
        <input type="email" id="email-address" name="email-address">
      </div>
      <div class="message">
        <label for="message-text">Message</label>
        <input type="text" id="message-text" name="message-text">
      </div>
      <div class="submit-button">
        <input type="submit">
      </div>
    </form>
  </div>
  <footer>
    <hr class="footer-divider">
    <div class="footer-content">
      <small>&copy; Copyright 2022, Dajabe - David Benton</small>
    </div>
  </footer>  
</body>
</html>
